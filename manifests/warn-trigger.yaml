apiVersion: apps/v1
kind: Deployment
metadata:
  name: warn-trigger-app
spec:
  replicas: 1
  strategy:
    type: Recreate
  template:
    spec:
      hostNetwork: false
      hostPID: false
      hostIPC: false
      securityContext:
        runAsNonRoot: true
      containers:
      - name: app
        image: my-app:1.0.0
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
        securityContext:
          privileged: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
